<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소문의섬</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="wrap">

    <!-- HEADER -->
    <header>
      <span class="site-name">소문의섬</span>
    </header>

    <!-- INTRO -->
    <section class="intro">
      <div class="status">
        <span class="status-dot"></span>
        지금 앱 만드는 중
      </div>
      <p class="intro-text">
        맥 앱 몇 개 만들었습니다.<br>
        디자인, 코딩, 마케팅 — 혼자 다 합니다.<br>
        <span class="em">가끔 유튜브에도 올라옵니다.</span>
      </p>
    </section>

    <hr class="divider" />

    <!-- APPS -->
    <section id="apps">
      <p class="section-title">만든 것들</p>
      <div class="app-list" id="app-grid">
        <!-- JS로 렌더링 -->
      </div>
    </section>

    <hr class="divider" />

    <!-- YOUTUBE -->
    <section id="youtube">
      <p class="section-title">최근 영상</p>
      <div class="yt-list">
        <a class="yt-item" href="https://youtube.com" target="_blank">
          <span class="yt-title">업로드 영상이 여기 나타납니다</span>
          <span class="yt-meta">2025.03</span>
        </a>
      </div>
    </section>

    <hr class="divider" />

    <!-- FOOTER -->
    <footer>
      <div class="footer-links">
        <a href="https://youtube.com" target="_blank">YouTube</a>
        <span class="footer-sep">·</span>
        <a href="https://github.com" target="_blank">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="https://twitter.com" target="_blank">Twitter</a>
        <span class="footer-sep">·</span>
        <a href="mailto:hello@example.com">hello@example.com</a>
      </div>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
