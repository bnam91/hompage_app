<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소문의섬 — Apps made with care.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" /></noscript>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <header>
    <nav>
      <a href="/" class="logo">소문의섬<span class="logo-accent">.</span></a>
      <div class="nav-links">
        <a href="#apps" class="active">Apps</a>
        <a href="#about">About</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Apps made<br>with <span class="highlight">care.</span></h1>
    <p class="hero-sub">
      Small team. Thoughtful apps. &middot; <a href="https://youtube.com" target="_blank">Watch on YouTube</a>
    </p>
    <div class="hero-meta">
      <span id="app-count">6</span> apps
      <span class="hero-meta-dot"></span>
      Mac &amp; iOS
      <span class="hero-meta-dot"></span>
      Made in Korea
    </div>
  </section>

  <!-- APP GRID -->
  <main id="apps">
    <p class="section-label">All Apps</p>
    <div class="app-grid" id="app-grid">
      <!-- 앱 카드는 JS로 렌더링 -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-info">
        <div>Made by <a href="https://youtube.com" target="_blank">소문의섬</a></div>
        <div><a href="mailto:hello@example.com">hello@example.com</a></div>
      </div>
      <div class="footer-social">
        <span class="footer-social-label">Follow</span>
        <div class="footer-social-links">
          <a href="https://youtube.com" target="_blank">
            <span class="social-dot"></span>YouTube
          </a>
          <a href="https://twitter.com" target="_blank">
            <span class="social-dot"></span>Twitter
          </a>
          <a href="https://github.com" target="_blank">
            <span class="social-dot"></span>GitHub
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
