<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소문의섬</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <nav>
      <a href="/" class="logo">소문의섬</a>
      <div class="nav-links">
        <a href="#apps">앱</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
      </div>
    </nav>
  </header>

  <section class="hero">
    <div class="hero-inner">
      <p class="hero-badge">인디 Mac 앱 · 1인 개발</p>
      <h1 class="hero-title">혼자 만들고,<br><span class="gradient-text">혼자 씁니다.</span></h1>
      <p class="hero-sub">내가 쓰려고 만든 앱이 어쩌다 6개가 됐어요.</p>
      <div class="hero-cta">
        <a href="#apps" class="cta-primary">앱 6개 보러 가기 →</a>
        <span class="cta-sep">·</span>
        <a href="https://youtube.com" target="_blank" class="cta-secondary">유튜브 →</a>
      </div>
    </div>
  </section>

  <main id="apps">
    <p class="section-label">만든 것들</p>
    <div class="app-grid" id="app-grid"></div>
  </main>

  <section id="youtube" class="yt-section">
    <p class="section-label">최근 영상</p>
    <ul class="yt-list" id="yt-list"></ul>
  </section>

  <footer>
    <div class="footer-inner">
      <span>소문의섬 · hello@example.com</span>
      <div class="footer-links">
        <a href="https://youtube.com" target="_blank">YouTube</a>
        <a href="https://github.com" target="_blank">GitHub</a>
        <a href="https://twitter.com" target="_blank">Twitter</a>
      </div>
    </div>
  </footer>
  <script src="app.js"></script>
</body>
</html>
