<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소문의섬</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <a href="/" class="logo">소문의섬</a>
  </header>

  <section class="intro">
    <div class="status"><span class="status-dot"></span>작업 중</div>
    <p class="intro-main">코딩하고 디자인하고 가끔 팝니다.</p>
    <p class="intro-sub">앱 만드는 소문의섬입니다.</p>
  </section>

  <hr>

  <main id="apps">
    <p class="section-title">만든 것들</p>
    <div class="app-grid" id="app-grid">
      <!-- 앱 카드는 JS로 렌더링 -->
    </div>
  </main>

  <hr>

  <section id="youtube">
    <p class="section-title">최근 영상</p>
    <ul class="yt-list" id="yt-list">
      <!-- 유튜브 목록은 JS로 렌더링 -->
    </ul>
  </section>

  <hr>

  <footer>
    <div class="footer-links">
      <a href="https://youtube.com" target="_blank">YouTube</a>
      <span class="footer-sep">·</span>
      <a href="https://github.com" target="_blank">GitHub</a>
      <span class="footer-sep">·</span>
      <a href="https://twitter.com" target="_blank">Twitter</a>
      <span class="footer-sep">·</span>
      <a href="mailto:hello@example.com">hello@example.com</a>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
