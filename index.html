<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>소문의섬 — 정성껏 만든 Mac 앱</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAV -->
  <header>
    <nav>
      <a href="/" class="logo">소문의섬</a>
      <div class="nav-links">
        <a href="#apps" class="active">앱</a>
        <a href="#about">소개</a>
        <a href="https://youtube.com" target="_blank">YouTube</a>
      </div>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Mac을 위해 만들었습니다.<br><span class="highlight">오래 쓸 수 있게.</span></h1>
    <p class="hero-sub">
      <span id="app-count">6</span>개 앱 &middot; 정성껏 만든 도구들 &middot; <a href="https://youtube.com" target="_blank">유튜브 채널</a>
    </p>
  </section>

  <!-- APP GRID -->
  <main id="apps">
    <div class="app-grid" id="app-grid">
      <!-- 앱 카드는 JS로 렌더링 -->
    </div>
  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-inner">
      <div class="footer-info">
        <div>소문의섬이 만들었습니다</div>
        <div><a href="mailto:hello@example.com">hello@example.com</a></div>
      </div>
      <div class="footer-social">
        <span class="footer-social-label">팔로우</span>
        <div class="footer-social-links">
          <a href="https://youtube.com" target="_blank">
            <span class="social-dot"></span>YouTube
          </a>
          <a href="https://twitter.com" target="_blank">
            <span class="social-dot"></span>Twitter
          </a>
          <a href="https://github.com" target="_blank">
            <span class="social-dot"></span>GitHub
          </a>
        </div>
      </div>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
